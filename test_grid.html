<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
            padding: 50px;
            background: #eee;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .projects-grid.is-expanded {
            grid-template-columns: repeat(3, 1fr);
        }

        .project-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 300px;
            /* default height */
            /* Do not transition layout properties directly, let FLIP handle it */
            cursor: pointer;
        }

        .project-card.is-active {
            grid-column: 1 / span 2;
            grid-row: 1 / span 7;
            order: -1;
            height: 100%;
            /* fill the 7 rows */
        }

        .img-placeholder {
            flex: 1;
            background: #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .details {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
    </style>
</head>

<body>
    <div class="projects-grid">
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 1</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 2</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 3</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 4</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 5</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 6</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 7</h4>
            </div>
        </div>
        <div class="project-card">
            <div class="img-placeholder"></div>
            <div class="details">
                <h4>Proj 8</h4>
            </div>
        </div>
    </div>

    <script>
        const grid = document.querySelector('.projects-grid');
        const cards = document.querySelectorAll('.project-card');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                const isExpanded = grid.classList.contains('is-expanded');
                const isActive = card.classList.contains('is-active');

                // 1. FIRST
                const states = Array.from(cards).map(c => {
                    const rect = c.getBoundingClientRect();
                    const img = c.querySelector('.img-placeholder').getBoundingClientRect();
                    const details = c.querySelector('.details').getBoundingClientRect();
                    return { rect, img, details };
                });

                // 2. LAST
                if (isActive) {
                    grid.classList.remove('is-expanded');
                    card.classList.remove('is-active');
                } else {
                    cards.forEach(c => c.classList.remove('is-active'));
                    grid.classList.add('is-expanded');
                    card.classList.add('is-active');
                }

                // 3. INVERT
                requestAnimationFrame(() => {
                    Array.from(cards).forEach((c, i) => {
                        const first = states[i].rect;
                        const last = c.getBoundingClientRect();

                        const deltaX = first.left - last.left;
                        const deltaY = first.top - last.top;
                        const scaleX = first.width / last.width;
                        const scaleY = first.height / last.height;

                        c.style.transformOrigin = 'top left';
                        c.style.transition = 'none';
                        c.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(${scaleX}, ${scaleY})`;

                        // invert children to counter scale
                        const imgFirst = states[i].img;
                        const imgLast = c.querySelector('.img-placeholder').getBoundingClientRect();
                        const img = c.querySelector('.img-placeholder');
                        // For children it's easier to just animate height or let flexbox do it, but to prevent distortion:
                        /* Flip children too if necessary */
                    });

                    // 4. PLAY
                    requestAnimationFrame(() => {
                        Array.from(cards).forEach((c) => {
                            c.style.transition = 'transform 0.7s cubic-bezier(0.4, 0, 0.2, 1)';
                            c.style.transform = 'translate(0, 0) scale(1, 1)';
                        });
                    });
                });
            });
        });
    </script>
</body>

</html>
